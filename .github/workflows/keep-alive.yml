name: Keep Render Alive

# Pings the MCP server every 10 minutes so Render's free tier never suspends
# the service (it sleeps after 15 min idle, causing 30-60s cold starts that
# time out the MCP connector handshake in Claude).

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping MCP server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://fantasy-baseball-mcp.onrender.com/health" \
            --max-time 60)
          echo "Render ping: HTTP $STATUS"
          if [[ "$STATUS" != "200" ]]; then
            echo "WARNING: unexpected status $STATUS"
            exit 1
          fi
