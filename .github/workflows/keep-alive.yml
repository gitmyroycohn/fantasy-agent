name: Keep Render Alive

# Pings /health every 10 minutes.
# If the server is cold (Render free-tier sleeps after 15 min idle), the first
# ping itself wakes it. This job then polls until it gets HTTP 200, confirming
# the server is fully warm before exiting. Subsequent tool calls will hit a
# live server with no cold-start delay.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake and confirm Render server is warm
        run: |
          URL="https://fantasy-baseball-mcp.onrender.com/health"
          MAX_WAIT=90   # seconds to wait for cold start to finish
          INTERVAL=5    # seconds between retries
          ELAPSED=0

          echo "Pinging $URL ..."

          while true; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            echo "  [${ELAPSED}s] HTTP $STATUS"

            if [[ "$STATUS" == "200" ]]; then
              echo "Server is warm (confirmed in ${ELAPSED}s)."
              exit 0
            fi

            if [[ "$ELAPSED" -ge "$MAX_WAIT" ]]; then
              echo "ERROR: server did not become healthy within ${MAX_WAIT}s (last status: $STATUS)"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
