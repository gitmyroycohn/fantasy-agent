name: Fantasy Agent

on:
  schedule:
    - cron: '0 12 * * *'   # 8am ET (UTC-4)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CBS_COOKIE: ${{ secrets.CBS_COOKIE }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python -m agent.main --run daily --dry-run

      - name: Commit latest_output.md
        run: |
          git config user.name  "Fantasy Agent"
          git config user.email "actions@github.com"
          git add logs/latest_output.md
          git diff --cached --quiet || git commit -m "agent run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
